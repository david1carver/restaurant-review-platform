# scripts/nginx/restaurant-review.conf
# nginx listens on :80 and reverse-proxies to two pm2-managed processes:
#   /      -> mesa-frontend (pm2 serve, port 3000)  -- the React build (SPA)
#   /api/  -> mesa-backend  (Node/Express, port 5001)
# This keeps the whole app on one public IP while pm2 status shows BOTH
# processes online

server {
    listen 80;
    server_name _;

    # API -> Node/Express backend (pm2: mesa-backend)
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> React SPA served by pm2 (mesa-frontend)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}