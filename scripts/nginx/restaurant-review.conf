# scripts/nginx/restaurant-review.conf
# nginx serves the React build at / and reverse-proxies /api to the Node backend
# on :5001, so the whole app is reachable on a single public IP over port 80.

server {
    listen 80;
    server_name _;

    root /var/www/restaurant-review;
    index index.html;

    # API -> Node/Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router: serve index.html for any unmatched client route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
