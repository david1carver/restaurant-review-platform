name: Backend CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted
    environment: MONGO_URI
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create production .env in backend
        run: echo "${{ secrets.PROD }}" > backend/.env

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Run backend unit tests
        working-directory: ./backend
        run: npm test

      - name: Install frontend dependencies and build
        working-directory: ./frontend
        env:
          CI: 'false'
        run: |
          npm ci || npm install
          rm -rf build
          npm run build

      # pm2 runs ONLY after a green build + test, and never "stop all",
      # so a failed run can never take the live site down.
      - name: Restart services with pm2
        run: |
          export PATH="$PATH:$(npm config get prefix)/bin:/usr/local/bin:/usr/bin"
          for d in "$HOME"/.nvm/versions/node/*/bin; do export PATH="$PATH:$d"; done
          command -v pm2 >/dev/null 2>&1 || npm install -g pm2
          pm2 restart backend  --update-env || pm2 start npm --name backend --cwd "$GITHUB_WORKSPACE/backend" -- start
          pm2 restart Frontend              || pm2 serve "$GITHUB_WORKSPACE/frontend/build" 3000 --name Frontend --spa
          pm2 save