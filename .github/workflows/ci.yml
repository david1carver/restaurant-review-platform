name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: build + unit test (runs on every push and PR) ────────────────────
  test:
    name: Run unit tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Show Node version (nvm)
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          node --version
      - name: Install backend dependencies
        working-directory: backend
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm install
      - name: Run backend unit tests (mocha + chai + sinon)
        working-directory: backend
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm test

  # ── CD: deploy onto the EC2 box this self-hosted runner lives on ─────────
  deploy:
    name: Deploy to EC2 (self-hosted runner, pm2 + nginx)
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: PROD
    steps:
      - uses: actions/checkout@v4
      - name: Write backend/.env from PROD secrets
        working-directory: backend
        run: |
          printf 'MONGO_URI=%s\nJWT_SECRET=%s\nPORT=%s\n' \
            '${{ secrets.MONGO_URI }}' '${{ secrets.JWT_SECRET }}' '${{ secrets.PORT }}' > .env
      - name: Install backend dependencies
        working-directory: backend
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm install
      - name: (Re)start backend with pm2
        working-directory: backend
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          pm2 delete backend >/dev/null 2>&1 || true
          pm2 start npm --name backend -- start
      - name: Build frontend
        working-directory: frontend
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          yarn install
          yarn run build
      - name: (Re)serve frontend with pm2
        working-directory: frontend
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          pm2 delete Frontend >/dev/null 2>&1 || true
          pm2 serve build/ 3000 --name Frontend --spa
      - name: Persist pm2 process list
        run: |
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          pm2 save